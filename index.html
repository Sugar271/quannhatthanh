<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Danh sách hoạt động</title><style>

body{
font-family:Arial;
margin:0;
padding:20px;
background:#f0f0f0;
background-size:cover;
background-position:center;
transition:0.3s;
}

h1{
text-align:center;
}

.controls{
text-align:center;
margin-bottom:20px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
margin:5px;
cursor:pointer;
color:white;
}

.activity{
background:rgba(255,255,255,0.9);
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

.gallery{
display:flex;
gap:10px;
overflow-x:auto;
margin-top:10px;
}

.imgBox{
position:relative;
}

.gallery img{
width:120px;
height:120px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}

.deleteImg{
position:absolute;
top:6px;
right:8px;
background:none;
border:none;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
padding:0;
line-height:1;
opacity:0.8;
}

.deleteImg:hover{
opacity:1;
}

.rating{
font-size:24px;
}

.heart{
color:#ccc;
cursor:pointer;
}

.heart.active{
color:#ff2a6d;
}

.settings{
display:none;
background:white;
padding:20px;
border-radius:10px;
margin:20px auto;
max-width:350px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.moveBtns{
margin-top:10px;
}

.moveBtns button{
background:#666;
}

#imageModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

#imageModal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

</style></head><body><h1 contenteditable="true" id="title">Danh sách hoạt động</h1><div class="controls">
<button id="addBtn">Thêm hoạt động</button>
<button id="settingsBtn">⚙ Settings</button>
</div><div id="settings" class="settings"><h3>Cài đặt giao diện</h3><label>Ảnh nền</label><br>
<input type="file" id="bgInput"><br><br>

<label>Cỡ chữ</label><br>
<input type="range" id="fontSize" min="12" max="40"><br><br>

<label>Font chữ</label><br>
<select id="fontSelect">

<option value="Arial">Arial</option>
<option value="Verdana">Verdana</option>
<option value="Times New Roman">Times</option>
<option value="Courier New">Courier</option>
</select><br><br><label>Màu chữ</label><br>
<input type="color" id="textColor"><br><br>

<label>Màu nút</label><br>
<input type="color" id="buttonColor">

</div><div id="activities"></div><div id="imageModal">
<img id="modalImg">
</div><script>

let db
const request=indexedDB.open("activityDB",1)

request.onupgradeneeded=e=>{
db=e.target.result
db.createObjectStore("data",{keyPath:"id"})
}

request.onsuccess=e=>{
db=e.target.result
loadData()
}

function saveData(){

const data={
id:"main",
title:title.innerText,
fontSize:document.body.style.fontSize,
fontFamily:document.body.style.fontFamily,
textColor:document.body.style.color,
background:document.body.style.backgroundImage,
buttonColor:addBtn.style.background,
activities:[]
}

document.querySelectorAll(".activity").forEach(act=>{

const name=act.querySelector(".name").value
const status=act.querySelector(".status").value
const rating=act.querySelectorAll(".heart.active").length

const images=[]
act.querySelectorAll(".gallery img").forEach(img=>{
images.push(img.src)
})

data.activities.push({name,status,rating,images})

})

const tx=db.transaction("data","readwrite")
tx.objectStore("data").put(data)

}

function loadData(){

const tx=db.transaction("data","readonly")
const store=tx.objectStore("data")
const req=store.get("main")

req.onsuccess=()=>{

const data=req.result
if(!data) return

title.innerText=data.title||"Danh sách hoạt động"

if(data.fontSize){
document.body.style.fontSize=data.fontSize
fontSize.value=parseInt(data.fontSize)
}

if(data.fontFamily){
document.body.style.fontFamily=data.fontFamily
fontSelect.value=data.fontFamily
}

if(data.textColor){
document.body.style.color=data.textColor
textColor.value=data.textColor
}

if(data.background){
document.body.style.backgroundImage=data.background
}

if(data.buttonColor){
addBtn.style.background=data.buttonColor
settingsBtn.style.background=data.buttonColor
buttonColor.value=data.buttonColor
}

data.activities.forEach(a=>addActivity(a))

}

}

settingsBtn.onclick=()=>{
settings.style.display=settings.style.display==="block"?"none":"block"
}

addBtn.onclick=()=>{
addActivity()
saveData()
}

function addActivity(data=null){

const div=document.createElement("div")
div.className="activity"

div.innerHTML=`

<input class="name" placeholder="Tên hoạt động" style="width:100%">

<br><br>

<select class="status">
<option>Chưa hoàn thành</option>
<option>Đang chuẩn bị</option>
<option>Đang thực hiện</option>
<option>Đã hoàn thành</option>
</select>

<br><br>

<input type="file" class="imgInput" multiple>

<div class="gallery"></div>

<br>

<div class="rating"></div>

<div class="moveBtns">
<button class="upBtn">⬆</button>
<button class="downBtn">⬇</button>
<button class="deleteBtn">Xóa</button>
</div>

`

activities.appendChild(div)

setupImages(div)
setupRating(div)

div.querySelector(".deleteBtn").onclick=()=>{
div.remove()
saveData()
}

div.querySelector(".upBtn").onclick=()=>{
const prev=div.previousElementSibling
if(prev) activities.insertBefore(div,prev)
saveData()
}

div.querySelector(".downBtn").onclick=()=>{
const next=div.nextElementSibling
if(next) activities.insertBefore(next,div)
saveData()
}

if(data){

div.querySelector(".name").value=data.name
div.querySelector(".status").value=data.status

const gallery=div.querySelector(".gallery")

data.images.forEach(src=>{
createImage(gallery,src)
})

const hearts=div.querySelectorAll(".heart")
for(let i=0;i<data.rating;i++) hearts[i].classList.add("active")

}

div.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",saveData)
el.addEventListener("change",saveData)
})

}

function createImage(gallery,src){

const box=document.createElement("div")
box.className="imgBox"

const img=document.createElement("img")
img.src=src

img.onclick=()=>{
modalImg.src=src
imageModal.style.display="flex"
}

const del=document.createElement("button")
del.className="deleteImg"
del.innerText="×"

del.onclick=e=>{
e.stopPropagation()
box.remove()
saveData()
}

box.appendChild(img)
box.appendChild(del)

gallery.appendChild(box)

}

imageModal.onclick=()=>{
imageModal.style.display="none"
}

function setupImages(activity){

const input=activity.querySelector(".imgInput")
const gallery=activity.querySelector(".gallery")

input.onchange=()=>{

for(let file of input.files){

const reader=new FileReader()

reader.onload=e=>{
createImage(gallery,e.target.result)
saveData()
}

reader.readAsDataURL(file)

}

}

}

function setupRating(activity){

const rating=activity.querySelector(".rating")

for(let i=1;i<=10;i++){

const heart=document.createElement("span")
heart.textContent="❤"
heart.className="heart"

heart.onclick=()=>{

const hearts=rating.querySelectorAll(".heart")
hearts.forEach(h=>h.classList.remove("active"))

for(let j=0;j<i;j++) hearts[j].classList.add("active")

saveData()

}

rating.appendChild(heart)

}

}

bgInput.onchange=function(){

const file=this.files[0]

if(file){

const reader=new FileReader()

reader.onload=e=>{
document.body.style.backgroundImage="url("+e.target.result+")"
saveData()
}

reader.readAsDataURL(file)

}

}

fontSize.oninput=function(){
document.body.style.fontSize=this.value+"px"
saveData()
}

fontSelect.onchange=function(){
document.body.style.fontFamily=this.value
saveData()
}

textColor.onchange=function(){
document.body.style.color=this.value
saveData()
}

buttonColor.onchange=function(){
addBtn.style.background=this.value
settingsBtn.style.background=this.value
saveData()
}

title.addEventListener("input",saveData)

</script></body>

<body>

<h1 id="title" contenteditable="true">Danh sách hoạt động</h1>

<button id="addBtn">Thêm hoạt động</button>

<div id="activities"></div>

<script>

const firebaseConfig = {
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT",
storageBucket:"YOUR_BUCKET",
appId:"YOUR_APP_ID"
}

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()
const storage = firebase.storage()

async function saveData(){

const activities=[]

document.querySelectorAll(".activity").forEach(act=>{

const name=act.querySelector(".name").value
const status=act.querySelector(".status").value

const images=[]
act.querySelectorAll("img").forEach(img=>{
images.push(img.src)
})

activities.push({name,status,images})

})

await db.collection("activities").doc("main").set({
title:title.innerText,
activities
})

}

async function loadData(){

const doc=await db.collection("activities").doc("main").get()

if(!doc.exists) return

const data=doc.data()

title.innerText=data.title

data.activities.forEach(a=>addActivity(a))

}

addBtn.onclick=()=>{
addActivity()
}

function addActivity(data=null){

const div=document.createElement("div")
div.className="activity"

div.innerHTML=`

<input class="name" placeholder="Tên hoạt động" style="width:100%">

<br><br>

<select class="status">
<option>Chưa hoàn thành</option>
<option>Đang chuẩn bị</option>
<option>Đang thực hiện</option>
<option>Đã hoàn thành</option>
</select>

<br><br>

<input type="file" class="imgInput" multiple>

<div class="gallery"></div>

<br>

<button class="deleteBtn">Xóa</button>

`

activities.appendChild(div)

const gallery=div.querySelector(".gallery")
const input=div.querySelector(".imgInput")

input.onchange=async()=>{

for(let file of input.files){

const ref=storage.ref("images/"+Date.now()+file.name)

await ref.put(file)

const url=await ref.getDownloadURL()

const img=document.createElement("img")
img.src=url

gallery.appendChild(img)

saveData()

}

}

div.querySelector(".deleteBtn").onclick=()=>{
div.remove()
saveData()
}

if(data){

div.querySelector(".name").value=data.name
div.querySelector(".status").value=data.status

data.images.forEach(src=>{
const img=document.createElement("img")
img.src=src
gallery.appendChild(img)
})

}

div.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("change",saveData)
})

}

loadData()

</script>

</body>
