<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Danh sách hoạt động</title>

<style>

body{
font-family:Arial;
margin:0;
padding:20px;
background:#f0f0f0;
background-size:cover;
background-position:center;
transition:0.3s;
}

h1{
text-align:center;
}

.controls{
text-align:center;
margin-bottom:20px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
margin:5px;
cursor:pointer;
color:white;
background:#444;
}

.activity{
background:rgba(255,255,255,0.9);
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

.gallery{
display:flex;
gap:10px;
overflow-x:auto;
margin-top:10px;
}

.imgBox{
position:relative;
}

.gallery img{
width:120px;
height:120px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}

.deleteImg{
position:absolute;
top:6px;
right:8px;
background:none;
border:none;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
padding:0;
line-height:1;
opacity:0.8;
}

.deleteImg:hover{
opacity:1;
}

.rating{
font-size:24px;
}

.heart{
color:#ccc;
cursor:pointer;
}

.heart.active{
color:#ff2a6d;
}

.settings{
display:none;
background:white;
padding:20px;
border-radius:10px;
margin:20px auto;
max-width:350px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.moveBtns{
margin-top:10px;
}

.moveBtns button{
background:#666;
}

#imageModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

#imageModal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

</style>

</head>

<body>

<h1 contenteditable="true" id="title">Danh sách hoạt động</h1>

<div class="controls">
<button id="addBtn">Thêm hoạt động</button>
<button id="settingsBtn">⚙ Settings</button>
</div>

<div id="settings" class="settings">

<h3>Cài đặt giao diện</h3>

<label>Ảnh nền</label><br>
<input type="file" id="bgInput"><br><br>

<label>Cỡ chữ</label><br>
<input type="range" id="fontSize" min="12" max="40"><br><br>

<label>Font chữ</label><br>
<select id="fontSelect">
<option value="Arial">Arial</option>
<option value="Verdana">Verdana</option>
<option value="Times New Roman">Times</option>
<option value="Courier New">Courier</option>
</select><br><br>

<label>Màu chữ</label><br>
<input type="color" id="textColor"><br><br>

<label>Màu nút</label><br>
<input type="color" id="buttonColor">

</div>

<div id="activities"></div>

<div id="imageModal">
<img id="modalImg">
</div>

<script>

const JSON_URL="https://drive.google.com/uc?export=download&id=1lk466oNFn6zCuRbxWQXnXgRbrS0OpEy5"

loadFromDrive()

async function loadFromDrive(){

try{

const res = await fetch(JSON_URL)
const data = await res.json()

if(!data.activities) return

activities.innerHTML=""

data.activities.forEach(a=>{
addActivity(a)
})

}catch(err){

console.log("Không tải được JSON",err)

}

}

settingsBtn.onclick=()=>{
settings.style.display=settings.style.display==="block"?"none":"block"
}

addBtn.onclick=()=>{
addActivity()
}

function addActivity(data=null){

const div=document.createElement("div")
div.className="activity"

div.innerHTML=`

<input class="name" placeholder="Tên hoạt động" style="width:100%">

<br><br>

<select class="status">
<option>Chưa hoàn thành</option>
<option>Đang chuẩn bị</option>
<option>Đang thực hiện</option>
<option>Đã hoàn thành</option>
</select>

<br><br>

<input type="file" class="imgInput" multiple>

<div class="gallery"></div>

<br>

<div class="rating"></div>

<div class="moveBtns">
<button class="upBtn">⬆</button>
<button class="downBtn">⬇</button>
<button class="deleteBtn">Xóa</button>
</div>

`

activities.appendChild(div)

setupImages(div)
setupRating(div)

div.querySelector(".deleteBtn").onclick=()=>{
div.remove()
}

div.querySelector(".upBtn").onclick=()=>{
const prev=div.previousElementSibling
if(prev) activities.insertBefore(div,prev)
}

div.querySelector(".downBtn").onclick=()=>{
const next=div.nextElementSibling
if(next) activities.insertBefore(next,div)
}

if(data){

div.querySelector(".name").value=data.name
div.querySelector(".status").value=data.status

const gallery=div.querySelector(".gallery")

data.images.forEach(src=>{
createImage(gallery,src)
})

const hearts=div.querySelectorAll(".heart")
for(let i=0;i<data.rating;i++) hearts[i].classList.add("active")

}

}

function createImage(gallery,src){

const box=document.createElement("div")
box.className="imgBox"

const img=document.createElement("img")
img.src=src

img.onclick=()=>{
modalImg.src=src
imageModal.style.display="flex"
}

const del=document.createElement("button")
del.className="deleteImg"
del.innerText="×"

del.onclick=e=>{
e.stopPropagation()
box.remove()
}

box.appendChild(img)
box.appendChild(del)

gallery.appendChild(box)

}

imageModal.onclick=()=>{
imageModal.style.display="none"
}

function setupImages(activity){

const input=activity.querySelector(".imgInput")
const gallery=activity.querySelector(".gallery")

input.onchange=()=>{

for(let file of input.files){

const reader=new FileReader()

reader.onload=e=>{
createImage(gallery,e.target.result)
}

reader.readAsDataURL(file)

}

}

}

function setupRating(activity){

const rating=activity.querySelector(".rating")

for(let i=1;i<=10;i++){

const heart=document.createElement("span")
heart.textContent="❤"
heart.className="heart"

heart.onclick=()=>{

const hearts=rating.querySelectorAll(".heart")
hearts.forEach(h=>h.classList.remove("active"))

for(let j=0;j<i;j++) hearts[j].classList.add("active")

}

rating.appendChild(heart)

}

}

bgInput.onchange=function(){

const file=this.files[0]

if(file){

const reader=new FileReader()

reader.onload=e=>{
document.body.style.backgroundImage="url("+e.target.result+")"
}

reader.readAsDataURL(file)

}

}

fontSize.oninput=function(){
document.body.style.fontSize=this.value+"px"
}

fontSelect.onchange=function(){
document.body.style.fontFamily=this.value
}

textColor.onchange=function(){
document.body.style.color=this.value
}

buttonColor.onchange=function(){
addBtn.style.background=this.value
settingsBtn.style.background=this.value
}

</script>

</body>
</html>
