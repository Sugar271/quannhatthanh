<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Danh sách hoạt động</title><style>

body{
font-family:Arial;
margin:0;
padding:20px;
background:#f0f0f0;
background-size:cover;
background-position:center;
transition:0.3s;
}

h1{
text-align:center;
}

.controls{
text-align:center;
margin-bottom:20px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
margin:5px;
cursor:pointer;
}

.activity{
background:rgba(255,255,255,0.9);
padding:15px;
margin-bottom:15px;
border-radius:10px;
cursor:grab;
}

.gallery{
display:flex;
gap:10px;
overflow-x:auto;
margin-top:10px;
padding-bottom:5px;
}

.gallery img{
width:120px;
height:120px;
object-fit:cover;
border-radius:8px;
flex-shrink:0;
}

.rating{
font-size:24px;
}

.heart{
color:#ccc;
cursor:pointer;
}

.heart.active{
color:#ff2a6d;
}

.settings{
display:none;
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

</style></head><body><h1 contenteditable="true" id="title">Danh sách hoạt động</h1><div class="controls"><button id="addBtn">Thêm hoạt động</button>
<button id="settingsBtn">⚙ Settings</button>

</div><div id="settings" class="settings"><h3>Cài đặt giao diện</h3><label>Đổi nền bằng ảnh</label><br>
<input type="file" id="bgInput"><br><br>

<label>Cỡ chữ</label><br>
<input type="range" id="fontSize" min="12" max="40" value="16"><br><br>

<label>Font chữ</label><br>
<select id="fontSelect">

<option value="Arial">Arial</option>
<option value="Verdana">Verdana</option>
<option value="Times New Roman">Times</option>
<option value="Courier New">Courier</option>
</select><br><br>

<label>Màu chữ</label><br>
<input type="color" id="textColor">

</div><div id="activities"></div><script>

const activities=document.getElementById("activities")

function saveData(){

const data={
title:document.getElementById("title").innerText,
activities:[]
}

document.querySelectorAll(".activity").forEach(act=>{

const name=act.querySelector(".name").value
const status=act.querySelector(".status").value
const rating=act.querySelectorAll(".heart.active").length
const images=[]

act.querySelectorAll(".gallery img").forEach(img=>{
images.push(img.src)
})

data.activities.push({name,status,rating,images})

})

localStorage.setItem("activityData",JSON.stringify(data))

}

function loadData(){

const saved=localStorage.getItem("activityData")

if(!saved) return

const data=JSON.parse(saved)

document.getElementById("title").innerText=data.title

data.activities.forEach(a=>{

addActivity(a)

})

}

document.getElementById("title").addEventListener("input",saveData)

document.getElementById("settingsBtn").onclick=function(){

const panel=document.getElementById("settings")

panel.style.display=panel.style.display==="block"?"none":"block"

}

document.getElementById("addBtn").onclick=function(){

addActivity()
saveData()

}

function addActivity(data=null){

const div=document.createElement("div")
div.className="activity"
div.draggable=true

div.innerHTML=`

<input class="name" placeholder="Tên hoạt động" style="width:100%;font-size:16px">

<br><br>

<select class="status">

<option>Chưa hoàn thành</option>
<option>Đang chuẩn bị</option>
<option>Đang thực hiện</option>
<option>Đã hoàn thành</option>

</select>

<br><br>

<input type="file" class="imgInput" multiple>

<div class="gallery"></div>

<br>

<div class="rating"></div>

<br>

<button class="deleteBtn">Xóa</button>

`

activities.appendChild(div)

setupImages(div)
setupRating(div)
setupDelete(div)
setupDrag(div)

if(data){

div.querySelector(".name").value=data.name
div.querySelector(".status").value=data.status

const gallery=div.querySelector(".gallery")

data.images.forEach(src=>{
const img=document.createElement("img")
img.src=src
gallery.appendChild(img)
})

const hearts=div.querySelectorAll(".heart")

setTimeout(()=>{
for(let i=0;i<data.rating;i++){
hearts[i].classList.add("active")
}
},100)

}

div.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("change",saveData)
el.addEventListener("input",saveData)
})

}

function setupDelete(activity){

activity.querySelector(".deleteBtn").onclick=function(){

activity.remove()
saveData()

}

}

function setupImages(activity){

const input=activity.querySelector(".imgInput")
const gallery=activity.querySelector(".gallery")

input.onchange=function(){

for(let file of input.files){

const img=document.createElement("img")
img.src=URL.createObjectURL(file)

gallery.appendChild(img)

}

saveData()

}

}

function setupRating(activity){

const rating=activity.querySelector(".rating")

for(let i=1;i<=10;i++){

const heart=document.createElement("span")

heart.textContent="❤"
heart.className="heart"

heart.onclick=function(){

const hearts=rating.querySelectorAll(".heart")

hearts.forEach(h=>h.classList.remove("active"))

for(let j=0;j<i;j++){
hearts[j].classList.add("active")
}

saveData()

}

rating.appendChild(heart)

}

}

let dragItem=null

function setupDrag(activity){

activity.addEventListener("dragstart",()=>{

dragItem=activity

})

activity.addEventListener("dragover",(e)=>{

e.preventDefault()

})

activity.addEventListener("drop",()=>{

if(dragItem!==activity){

activities.insertBefore(dragItem,activity)

saveData()

}

})

}

document.getElementById("bgInput").onchange=function(){

const file=this.files[0]

if(file){

const url=URL.createObjectURL(file)

document.body.style.backgroundImage="url("+url+")"

localStorage.setItem("bgImage",url)

}

}

document.getElementById("fontSize").oninput=function(){

document.body.style.fontSize=this.value+"px"

}

document.getElementById("fontSelect").onchange=function(){

document.body.style.fontFamily=this.value

}

document.getElementById("textColor").onchange=function(){

document.body.style.color=this.value

}

loadData()

</script></body>
</html>
